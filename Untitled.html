    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Poppins:wght@600;700&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f0fdf4; /* 非常淡的薄荷綠/海灘底色 */
            background-image: radial-gradient(at 0% 0%, hsla(199,100%,94%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(217,100%,94%,1) 0, transparent 50%);
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }
        
        .font-poppins { font-family: 'Poppins', sans-serif; }

        /* 隱藏卷軸但保持可滑動 */
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* 天數選擇器樣式 */
        .day-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-tab.active { 
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white; 
            transform: scale(1.05);
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4);
            border-color: transparent;
        }

        /* 卡片與時間軸樣式 */
        .card-shadow { 
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08); 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-shadow:active {
            transform: scale(0.98);
            box-shadow: 0 5px 20px -10px rgba(0, 0, 0, 0.1);
        }
        .timeline-line { 
            position: absolute; 
            left: 24px; 
            top: 20px; 
            bottom: 0; 
            width: 2px; 
            background: linear-gradient(to bottom, #bae6fd, #e2e8f0, transparent); 
        }

        /* 漸層圖標背景 */
        .icon-gradient-transport { background: linear-gradient(135deg, #eff6ff, #dbeafe); border-color: white; }
        .icon-gradient-food { background: linear-gradient(135deg, #fff7ed, #ffedd5); border-color: white; }
        .icon-gradient-shop { background: linear-gradient(135deg, #faf5ff, #f3e8ff); border-color: white; }
        .icon-gradient-stay { background: linear-gradient(135deg, #ecfdf5, #d1fae5); border-color: white; }

        /* 動畫 */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-item {
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0; /* 初始隱藏，等待動畫 */
        }
    </style>
</head>

                status: "🚶 散步同埋搭單軌",
                statusColor: "text-emerald-700 bg-emerald-50 border-emerald-100",
                events: [
                    { time: "09:45", name: "波上宮", type: "stay", info: "⛩️ 琉球八社之首，求返個交通安全御守", map: "https://www.google.com/maps/search/?api=1&query=Naminoue+Shrine", duration: "1h" },
                    { time: "11:00", name: "傑克牛排館", type: "food", info: "🥩 懷舊美式風味，老字號名店", map: "https://www.google.com/maps/search/?api=1&query=Jack's+Steak+House+Naha", duration: "1.5h" },
                    { time: "12:45", name: "駿河屋 (那霸沖映通り店)", type: "shop", info: "🔥 動漫迷天堂！喺國際通隔離，唔使揸車都去到，最後機會狂掃動漫周邊同埋扭蛋！", map: "https://www.google.com/maps/search/?api=1&query=Surugaya+Naha+Okiei-dori", duration: "1.5h" },
                    { time: "14:15", name: "第一牧志公設市場", type: "shop", info: "🦐 沖繩人嘅廚房！新裝修完超級乾淨，同B豬入去睇吓海鮮、買啲特產同行吓街", map: "https://www.google.com/maps/search/?api=1&query=第一牧志公設市場", duration: "1h" },
                    { time: "15:15", name: "國際通最後補貨", type: "shop", info: "🛍️ 買埋啲手信同埋零食", duration: "1h" },
                    { time: "16:30", name: "機場 Check-in", type: "transport", info: "✈️ 帶住滿載而歸嘅行李同開心回憶返澳門啦！", duration: "2h" }
                ]
            }
        };

        const typeStyles = {
            transport: { icon: 'car-front', color: 'text-blue-500', bgClass: 'icon-gradient-transport' },
            food: { icon: 'utensils', color: 'text-orange-500', bgClass: 'icon-gradient-food' },
            shop: { icon: 'shopping-bag', color: 'text-purple-500', bgClass: 'icon-gradient-shop' },
            stay: { icon: 'camera', color: 'text-emerald-500', bgClass: 'icon-gradient-stay' }
        };

        function showDay(dayNum) {
            // 更新 Tab 狀態
            document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${dayNum}`).classList.add('active');

            const day = itineraryData[dayNum];
            const container = document.getElementById('itinerary-content');
            
            // 更新 Header 的日期 (擷取 title 前面的日期例如 "5/24")
            const dateMatch = day.title.match(/^\d+\/\d+/);
            if(dateMatch) {
                document.getElementById('header-date').innerText = dateMatch[0];
            }

            // 標題區塊
            let html = `
                <div class="mt-8 mb-8 animate-item" style="animation-delay: 0s">
                    <h2 class="text-2xl font-black text-slate-800 leading-tight">${day.title.substring(day.title.indexOf(':') + 1).trim()}</h2>
                    <div class="mt-3 flex items-center gap-2">
                        <span class="px-3 py-1 rounded-full text-xs font-bold tracking-wide border ${day.statusColor}">${day.status}</span>
                    </div>
                </div>
                <div class="relative">
                    <div class="timeline-line"></div>
            `;

            // 行程卡片
            day.events.forEach((event, idx) => {
                const style = typeStyles[event.type];
                // 每個卡片延遲 0.1 秒出現，製造瀑布流效果
                const delay = (idx + 1) * 0.1; 
                
                html += `
                    <div class="relative pl-14 mb-8 animate-item" style="animation-delay: ${delay}s">
                        <!-- 圖標 -->
                        <div class="absolute left-0 top-1 w-12 h-12 ${style.bgClass} rounded-2xl flex items-center justify-center z-10 border-4 shadow-sm">
                            <i data-lucide="${style.icon}" class="w-[22px] h-[22px] ${style.color}"></i>
                        </div>
                        
                        <!-- 卡片內容 -->
                        <div class="bg-white p-5 rounded-[1.5rem] card-shadow border border-slate-50">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm font-poppins font-black text-sky-600 tracking-widest">${event.time}</span>
                                ${event.duration ? `<span class="text-[10px] bg-slate-50 border border-slate-100 text-slate-500 px-2.5 py-1 rounded-lg font-bold">逗留 ${event.duration}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg mb-1.5 leading-tight">${event.name}</h3>
                            <p class="text-slate-500 text-sm mb-4 leading-relaxed">${event.info}</p>
                            ${event.map ? `
                                <a href="${event.map}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-gradient-to-r from-sky-500 to-blue-500 text-white text-xs font-bold rounded-xl shadow-md shadow-sky-500/20 tracking-wider hover:opacity-90 active:scale-[0.98] transition-all">
                                    <i data-lucide="map-pin" class="w-4 h-4"></i> 打開地圖導航
                                </a>
                            ` : ''}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
            
            // 重新渲染圖標
            lucide.createIcons();
            
            // 讓畫面平滑回到最頂部，並稍微預留 header 空間
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        window.onload = () => {
            showDay(1);
            lucide.createIcons();
        };
    </script>
</body>
</html>
